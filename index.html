<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Álbum da Copa</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>⚽ Álbum da Copa</h1>

    <div class="card cadastro">
      <h2>Cadastrar Figurinha</h2>

    <select id="selecao">

     	<option value="">Seleção</option>

 	<option>MEX</option>
<option>RSA</option>
<option>KOR</option>

<option>CAN</option>
<option>BIH</option>

<option>SUI</option>

<option>MAR</option>
<option>HAI</option>
<option>SCO</option>
<option>USA</option>
<option>PAR</option>
<option>AUS</option>
<option>TUR</option>
<option>GER</option>
<option>CUW</option>
<option>CIV</option>
<option>ECU</option>
<option>NED</option>
<option>JPN</option>
<option>SWE</option>
<option>TUN</option>
<option>BEL</option>
<option>EGY</option>
<option>IRN</option>
<option>NZL</option>
<option>ESP</option>
<option>CPV</option>
<option>KSA</option>

<option>GHA</option>

</select>

      <input type="number" id="numero" placeholder="Número da figurinha">


      <select id="status">
        <option value="colada">✅ Colada</option>
        <option value="repetida">🔁 Repetida</option>
      </select>

      <button onclick="adicionarFigurinha()">
        Adicionar
      </button>
    </div>

    <div class="card resumo">
      <h2>📊 Resumo</h2>

      <p>Total do álbum: <span id="totalAlbum">670</span></p>
      <p>Coladas: <span id="totalColadas">0</span></p>
      <p>Repetidas: <span id="totalRepetidas">0</span></p>
      <p>Faltando: <span id="totalFaltando">670</span></p>
    </div>

    <div class="listas">

      <div class="card">
        <h2>✅ Coladas</h2>
        <ul id="listaColadas"></ul>
      </div>

      <div class="card">
        <h2>🔁 Repetidas</h2>
        <ul id="listaRepetidas"></ul>
      </div>

      <div class="card">
        <h2>❌ Faltando</h2>
        <ul id="listaFaltando"></ul>
      </div>

    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
